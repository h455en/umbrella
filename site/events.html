function linkify(text) {
  let out = text;
  for (const term in links) out = out.replace(new RegExp(term,"g"), `<a class="wikilink text-sky" href="${links[term]}" target="_blank" rel="noopener">${term}</a>`);
  return out;
}
function constelLink(name) {
  if (name === "—" || !constelLinks[name]) return name;
  return `<a class="wikilink text-green" href="${constelLinks[name]}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${name}</a>`;
}
function constelSvg(name) {
  const info = constelArabic[name];
  if (!info || !info.shape) return '';
  const { points, lines } = info.shape;
  const lineSvg = lines.map(([a,b]) => `<line x1="${points[a][0]}" y1="${points[a][1]}" x2="${points[b][0]}" y2="${points[b][1]}" stroke="#6ec6ff" stroke-width="1.4" opacity="0.8"/>`).join('');
  const dotSvg = points.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="2.6" fill="#ffd166"/>`).join('');
  return `<svg viewBox="0 0 100 100" class="w-28 h-28 mx-auto my-2 bg-panel2/40 rounded-md p-1">${lineSvg}${dotSvg}</svg>`;
}
function arabicDetailHtml(constellation) {
  const info = constelArabic[constellation];
  if (!info) return `<div class="text-gray-500 text-xs">Pas de détail disponible pour cette constellation.</div>`;
  const starsHtml = info.stars.map(s => `
    <div class="flex justify-between items-center border-b border-border/50 py-1">
      <span class="text-gray-300 text-xs">${s[0]}</span>
      <span class="arabic text-gold text-sm">${s[1]}</span>
      <span class="text-gray-500 text-[10px] italic">${s[2]}</span>
    </div>`).join('');
  return `
    <div class="mt-2 pt-2 border-t border-border">
      <div class="text-green text-xs mb-1">Nom arabe : <span class="arabic text-base">${info.ar}</span></div>
      <div class="text-center">${constelSvg(constellation)}<div class="text-gray-600 text-[9px]">schéma simplifié, non à l'échelle</div></div>
      <div class="text-gray-400 text-[11px] mb-1 mt-2">Étoiles principales :</div>
      ${starsHtml}
    </div>`;
}

const today = new Date();

function closestEventIndex(events) {
  let minDiff = Infinity, idx = 0;
  events.forEach((e, i) => {
    if (e[0] === "—") return;
    const diff = Math.abs(parseInt(e[0],10) - today.getDate());
    if (diff < minDiff) { minDiff = diff; idx = i; }
  });
  return idx;
}
function buildGazingWindow(monthIndex, newMoonDay) {
  const nm = new Date(2026, monthIndex, newMoonDay);
  const days = [];
  for (let off = -3; off <= 3; off++) {
    const d = new Date(nm); d.setDate(d.getDate() + off);
    const abbr = dayAbbr[d.getDay()];
    days.push({ date: d.getDate(), month: d.toLocaleDateString('fr-FR',{month:'short'}), abbr,
      isWeekend: abbr === 'VEN' || abbr === 'SAM', isToday: d.toDateString() === today.toDateString() });
  }
  return days;
}

  panelsEl.appendChild(panel);
});

const allTabs = [...monthOrder, 'Ready'];
let currentTabIndex = currentMonthIndex;

function switchTab(name) {
  currentTabIndex = allTabs.indexOf(name);
  allTabs.forEach(m => {
    const isNow = m === name;
    const el = document.getElementById('tab-' + m);
    el.className = 'flex-shrink-0 px-2 py-1 rounded text-[11px] border ' + (isNow ? 'bg-sky text-night font-bold border-sky' : 'bg-panel text-gray-300 border-border hover:bg-panel2');
    if (m !== 'Ready') el.innerHTML = `${m.slice(0,3)} <span class="ml-0.5 rounded-full px-1 text-[9px] ${isNow ? 'bg-black/20' : 'bg-white/10'}">${data[m].events.length}</span>`;
    document.getElementById('panel-' + m).classList.toggle('hidden', !isNow);
  });
  document.getElementById('tab-' + name).scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

document.getElementById('tabPrev').onclick = () => switchTab(allTabs[(currentTabIndex - 1 + allTabs.length) % allTabs.length]);
document.getElementById('tabNext').onclick = () => switchTab(allTabs[(currentTabIndex + 1) % allTabs.length]);

let touchStartX = 0;
panelsEl.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
panelsEl.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0) switchTab(allTabs[(currentTabIndex + 1) % allTabs.length]);
    else switchTab(allTabs[(currentTabIndex - 1 + allTabs.length) % allTabs.length]);
  }
});
</script>
