function closestEventIndex(events) {
  let minDiff = Infinity, idx = 0;
  events.forEach((e, i) => {
    const diff = Math.abs(parseInt(e[0],10) - today.getDate());
    if (diff < minDiff) { minDiff = diff; idx = i; }
  });
  return idx;
}
function buildGazingWindow(monthIndex, newMoonDay) {
  const nm = new Date(2026, monthIndex, newMoonDay);
  const days = [];
  for (let off = -3; off <= 3; off++) {
    const d = new Date(nm);
    d.setDate(d.getDate() + off);
    const abbr = dayAbbr[d.getDay()];
    const isWeekend = abbr === 'VEN' || abbr === 'SAM';
    const isToday = d.toDateString() === today.toDateString();
    days.push({ date: d.getDate(), month: d.toLocaleDateString('fr-FR',{month:'short'}), abbr, isWeekend, isToday });
  }
  return days;
}
