<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilités après Prière - 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #1e2937;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        header {
            background: #1e2937;
            color: white;
            padding: 10px 16px;
            font-size: 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }
        h1 { 
            text-align: center; 
            margin: 15px 0 8px; 
            font-size: 1.75rem; 
        }
        .subtitle { 
            text-align: center; 
            color: #64748b; 
            margin-bottom: 20px; 
        }

        .date-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .date-controls button {
            background: #2563eb;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .date-controls input[type="date"] {
            padding: 10px 14px;
            font-size: 1.05rem;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }

        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 14px;
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 16px 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        }
        .card.next {
            border: 2px solid #2563eb;
            background: #f0f9ff;
        }
        .prayer-name {
            font-size: 1.22rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        .prayer-time {
            font-size: 1.75rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 12px;
        }
        .kpi {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 12px;
            margin: 8px 0;
            font-weight: 600;
        }
        .kpi-from { background: #ecfdf5; color: #0f766e; }
        .kpi-until { background: #f0f9ff; color: #1e40af; }
        .kpi-label { font-size: 0.85rem; font-weight: 500; }
        .kpi-value { font-size: 1.32rem; font-weight: 700; }
        .remaining {
            font-size: 0.9rem;
            color: #64748b;
            text-align: center;
            margin-top: 4px;
        }
        .friday-note {
            margin-top: 12px;
            padding: 8px;
            background: #fefce8;
            color: #854d0e;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
        }

        .settings {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -4px 25px rgba(0,0,0,0.18);
            padding: 24px;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s ease;
            z-index: 200;
        }
        .settings.open { transform: translateY(0); }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #64748b;
        }
        .footer-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #2563eb;
            color: white;
            padding: 13px 30px;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(37,99,235,0.35);
            font-weight: 600;
            cursor: pointer;
            z-index: 150;
        }
    </style>
</head>
<body>

        <h1>Disponibilités après Prière</h1>
        <p class="subtitle">Avril — Décembre 2026</p>

        <div class="date-controls">
            <button onclick="prevDay()">←</button>
            <input type="date" id="datePicker" onchange="loadSelectedDate()">
            <button onclick="nextDay()">→</button>
        </div>

        <div class="prayer-grid" id="prayerGrid"></div>
    </div>

            <button class="close-btn" onclick="toggleSettings()">×</button>
        </div>
        
        <div style="margin-bottom:24px;">
            <label style="display:block; margin-bottom:8px; font-weight:500;">Délai après la prière</label>
            <input type="number" id="delayAfter" value="30" min="0" max="180" style="width:110px; padding:12px; font-size:1.1rem;">
            <span style="margin-left:10px;">minutes</span>
        </div>

        <div>
            <label style="display:block; margin-bottom:8px; font-weight:500;">Temps avant la prière ("jusqu'à")</label>
            <input type="number" id="delayBefore" value="15" min="0" max="60" style="width:110px; padding:12px; font-size:1.1rem;">
            <span style="margin-left:10px;">minutes</span>
        </div>

        <div style="margin-top:32px; text-align:center;">
            <button onclick="saveSettings()" style="padding:14px 40px; font-size:1.1rem;">Enregistrer</button>
        </div>
    </div>

    <div class="footer-bar" onclick="toggleSettings()">⚙️ Paramètres</div>

        const prayerNames = {
            fajr: "Fajr", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Maghrib", isha: "Isha"
        };

        let delayAfter = 30;
        let delayBefore = 15;
        let currentDateStr = "";

        function roundToNext10(timeStr) {
            let [h, m] = timeStr.split(':').map(Number);
            m = Math.ceil(m / 10) * 10;
            if (m === 60) { m = 0; h += 1; }
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        }

        function minutesToHHMM(minutes) {
            if (minutes <= 0) return "00:00";
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        }

        function isFriday(dateStr) {
            return new Date(dateStr).getDay() === 5;
        }

        function displayPrayers(dateStr) {
            currentDateStr = dateStr;
            const data = prayerData[dateStr];
            if (!data) {
                document.getElementById('prayerGrid').innerHTML = `<p style="text-align:center;color:#ef4444;padding:40px;">Aucune donnée pour cette date.</p>`;
                return;
            }

            const grid = document.getElementById('prayerGrid');
            grid.innerHTML = '';

            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();

            Object.keys(prayerNames).forEach(key => {
                const prayerTime = data[key];

                // Disponible dès
                let [h, m] = prayerTime.split(':').map(Number);
                let fromMin = h*60 + m + delayAfter;
                let dispoFrom = roundToNext10(`${Math.floor(fromMin/60)}:${fromMin%60}`);

                if (isFriday(dateStr) && key === "dhuhr") dispoFrom = "14:00";

                // Disponible jusqu'à = cette prière - delayBefore
                let [ph, pm] = prayerTime.split(':').map(Number);
                let untilMin = ph*60 + pm - delayBefore;
                let dispoUntil = roundToNext10(`${Math.floor(untilMin/60)}:${untilMin%60}`);

                // Temps restant
                let remainingMin = untilMin - nowMin;
                let remainingStr = remainingMin > 0 
                    ? `(${minutesToHHMM(remainingMin)} restant)` 
                    : "(temps écoulé)";

                const card = document.createElement('div');
                card.className = `card`;
                card.innerHTML = `
                    <div class="prayer-name">${prayerNames[key]}</div>
                    <div class="prayer-time">${prayerTime}</div>
                    
                    <div class="kpi kpi-from">
                        <span class="kpi-label">Dès</span>
                        <span class="kpi-value">${dispoFrom}</span>
                    </div>
                    
                    <div class="kpi kpi-until">
                        <span class="kpi-label">Jusqu'à</span>
                        <span class="kpi-value">${dispoUntil}</span>
                    </div>
                    
                    <div class="remaining">${remainingStr}</div>

                    ${isFriday(dateStr) && key === "dhuhr" ? `<div class="friday-note">Vendredi : dès 14h00</div>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        function loadSelectedDate() {
            const selected = document.getElementById('datePicker').value;
            if (selected) displayPrayers(selected);
        }

        function prevDay() {
            let date = new Date(currentDateStr);
            date.setDate(date.getDate() - 1);
            const newDate = date.toISOString().split('T')[0];
            if (prayerData[newDate]) {
                document.getElementById('datePicker').value = newDate;
                displayPrayers(newDate);
            }
        }

        function nextDay() {
            let date = new Date(currentDateStr);
            date.setDate(date.getDate() + 1);
            const newDate = date.toISOString().split('T')[0];
            if (prayerData[newDate]) {
                document.getElementById('datePicker').value = newDate;
                displayPrayers(newDate);
            }
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function saveSettings() {
            delayAfter = parseInt(document.getElementById('delayAfter').value) || 30;
            delayBefore = parseInt(document.getElementById('delayBefore').value) || 15;
            toggleSettings();
            if (currentDateStr) displayPrayers(currentDateStr);
        }

        function updateRealTime() {
            setInterval(() => {
                const now = new Date();
                const opt = { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' };
                document.getElementById('currentTime').textContent = now.toLocaleDateString('fr-FR', opt);
            }, 1000);
        }

        // Initialisation
        window.onload = function() {
            updateRealTime();

            const today = new Date();
            let defaultDate = today.toISOString().split('T')[0];

            // Limite à la période disponible
            if (defaultDate < "2026-04-01") defaultDate = "2026-04-01";
            if (defaultDate > "2026-12-31") defaultDate = "2026-12-01";

            document.getElementById('datePicker').value = defaultDate;
            currentDateStr = defaultDate;
            displayPrayers(defaultDate);
        };
    </script>
</body>
</html>
